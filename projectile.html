<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIST | Projectile Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #003366;
            --accent: #3b82f6;
            --dark: #0a192f;
            --slate: #1e293b;
            --white: #fff;
        }

        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 15px; color: var(--dark); }
        .container { max-width: 1000px; margin: auto; }

        /* Simulation Screen */
        .sim-viewport {
            background: var(--dark);
            border-radius: 24px;
            height: 350px;
            position: relative;
            overflow: hidden;
            border: 4px solid var(--slate);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        svg { width: 100%; height: 100%; }

        /* HUD Display */
        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #60a5fa;
            font-family: monospace;
            font-size: 0.8rem;
        }

        /* Controls */
        .control-panel {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: end;
        }

        .slider-group { display: flex; flex-direction: column; gap: 8px; }
        .slider-group label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #64748b; }
        .val-display { color: var(--accent); font-weight: 900; float: right; }

        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }

        select {
            padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0;
            font-weight: 600; outline: none; background: #f1f5f9;
        }

        .launch-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .launch-btn:hover { background: #2563eb; transform: translateY(-2px); }
        .launch-btn:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="container">
    <div style="margin-bottom: 20px;">
        <h1 style="margin:0; color: var(--primary); font-weight: 900;">Ballistics Lab</h1>
        <p style="margin:0; font-size: 0.9rem; color: #64748b;">MIST Computational Physics Module</p>
    </div>

    <div class="sim-viewport">
        <div class="hud">
            LIVE VECTORS<br>
            <span id="coords">X: 0 | Y: 0</span>
        </div>
        
        <svg id="canvas" viewBox="0 0 800 400">
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
            
            <path id="path" d="" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,5" opacity="0.6"/>
            
            <circle id="projectile" cx="20" cy="380" r="8" fill="#ef4444" style="filter: drop-shadow(0 0 8px rgba(239,68,68,0.8))" />
            
            <rect x="10" y="375" width="20" height="10" fill="#475569" />
            <g id="barrel" transform="rotate(-45, 20, 380)">
                <rect x="20" y="375" width="40" height="10" fill="#64748b" rx="2" />
            </g>
            
            <rect x="0" y="380" width="800" height="20" fill="#0f172a" />
        </svg>
    </div>

    <div class="control-panel">
        <div class="slider-group">
            <label>Angle <span class="val-display" id="angleVal">45°</span></label>
            <input type="range" id="angle" min="0" max="90" value="45">
        </div>
        
        <div class="slider-group">
            <label>Velocity <span class="val-display" id="velVal">60 m/s</span></label>
            <input type="range" id="vel" min="10" max="120" value="60">
        </div>

        <div class="slider-group">
            <label>Environment</label>
            <select id="gravity">
                <option value="9.8">Earth (9.8m/s²)</option>
                <option value="1.62">Moon (1.62m/s²)</option>
                <option value="3.71">Mars (3.71m/s²)</option>
                <option value="24.79">Jupiter (24.79m/s²)</option>
            </select>
        </div>

        <button class="launch-btn" id="launchBtn">
            <i data-lucide="play" size="18"></i> INITIATE LAUNCH
        </button>
    </div>
</div>

<script>
    const projectile = document.getElementById('projectile');
    const pathTag = document.getElementById('path');
    const barrel = document.getElementById('barrel');
    const coordDisplay = document.getElementById('coords');
    
    let isFiring = false;

    // Update Barrel Angle Visually
    document.getElementById('angle').addEventListener('input', (e) => {
        const val = e.target.value;
        document.getElementById('angleVal').innerText = val + "°";
        barrel.setAttribute('transform', `rotate(${-val}, 20, 380)`);
    });

    document.getElementById('vel').addEventListener('input', (e) => {
        document.getElementById('velVal').innerText = e.target.value + " m/s";
    });

    function launch() {
        if (isFiring) return;
        isFiring = true;
        
        const v0 = Number(document.getElementById('vel').value);
        const angle = Number(document.getElementById('angle').value);
        const g = Number(document.getElementById('gravity').value);
        
        const theta = (angle * Math.PI) / 180;
        const scale = 3; 
        const startX = 20;
        const startY = 380;

        let t = 0;
        const dt = 0.05;
        let dPath = `M ${startX} ${startY}`;

        function step() {
            const x = v0 * Math.cos(theta) * t;
            const y = (v0 * Math.sin(theta) * t) - (0.5 * g * Math.pow(t, 2));

            const drawX = startX + (x * scale);
            const drawY = startY - (y * scale);

            if (drawY > startY || drawX > 800) {
                isFiring = false;
                document.getElementById('launchBtn').innerHTML = '<i data-lucide="rotate-ccw"></i> RESET';
                lucide.createIcons();
                return;
            }

            projectile.setAttribute('cx', drawX);
            projectile.setAttribute('cy', drawY);
            
            dPath += ` L ${drawX} ${drawY}`;
            pathTag.setAttribute('d', dPath);
            
            coordDisplay.innerText = `X: ${Math.round(x)}m | Y: ${Math.round(y)}m`;

            t += dt;
            requestAnimationFrame(step);
        }
        
        pathTag.setAttribute('d', ""); // Reset path
        requestAnimationFrame(step);
    }

    document.getElementById('launchBtn').onclick = () => {
        if (!isFiring) launch();
        else location.reload(); // Simple reset
    };

    lucide.createIcons();
</script>
</body>
</html>
